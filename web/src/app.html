<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Reef brand fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Quicksand:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>

		<!-- Favicons & app icons (kit lives in web/static/brand/) -->
		<link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png" />
		<link rel="icon" type="image/svg+xml" href="/brand/seeurchin-mark.svg" />
		<link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon-180.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#fdf7ec" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#072e3d" media="(prefers-color-scheme: dark)" />

		<!-- No-flash theme: set data-theme before first paint.
		     Mode is "system" (default), "light", or "dark", stored in localStorage. -->
		<script>
			(function () {
				try {
					var m = localStorage.getItem('seeurchin-theme') || 'system';
					var dark = m === 'dark' || (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
